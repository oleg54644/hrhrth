name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('client/buildozer.spec') }}-v4
          restore-keys: buildozer-

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache libltdl-dev

      - name: Install buildozer and cython
        run: |
          python3.11 -m pip install --upgrade pip
          python3.11 -m pip install cython==0.29.33
          python3.11 -m pip install buildozer==1.5.0

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          mkdir -p ~/.buildozer/android/platform
          # Принять все лицензии заранее
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license

      - name: Build APK
        working-directory: client
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          yes | python3.11 -m buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: VoIPPhone-debug-apk
          path: client/bin/*.apk
          retention-days: 14

