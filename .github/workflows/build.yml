name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('client/buildozer.spec') }}-v8

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk wget \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache libltdl-dev lld

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33 buildozer==1.5.0

      - name: Setup Android SDK
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/
          mv /tmp/cmdline-tools $SDK/cmdline-tools/latest
          mkdir -p $SDK/tools/bin
          ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
          mkdir -p $SDK/licenses
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd975f751698a77b662f1254ddbeed3901e976f5a\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a' > $SDK/licenses/android-sdk-license
          yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK \
            "platform-tools" "build-tools;33.0.2" "platforms;android-33" 2>/dev/null || true
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV

      - name: Build APK
        working-directory: client
        env:
          PYTHONPATH: ""
        run: buildozer android debug 2>&1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: VoIPPhone-apk
          path: client/bin/*.apk
